# ── Walkthrough ──────────────────────────────────────────────────────────────
#
# Scenario: Agent is about to run `git push --force`.
#
# 1. Agent calls:
#    python3 audit.py --pending "git push --force origin main" \
#      --category git_destructive \
#      --scope "remote main branch (overwrites 2 commits)" \
#
#    Output:
#      ⏳ Pending confirmation: git push --force origin main
#         Category:   git_destructive
#         Scope:      remote main branch (overwrites 2 commits)
#         Reversible: NO
#         Expires:    5 minutes from now
#
# 2. Agent tells user:
#    "I'm about to run `git push --force origin main`.
#     This will overwrite 2 commits on the remote main branch and cannot be undone.
#     Confirm with 'yes' to proceed."
#
# 3. User says "yes":
#    python3 audit.py --confirm "git push --force origin main" --phrase "yes"
#    → "✓ Action confirmed and logged"
#    → Agent executes the push.
#
# 4. User says "no":
#    python3 audit.py --reject "git push --force origin main"
#    → "✗ Action rejected and logged"
#    → Agent does not execute.
#
# 5. 5 minutes pass with no response:
#    python3 audit.py --expire-stale
#    → "⏰ Expired pending action: git push --force origin main"
#    → Agent re-prompts user if still needed.
#
# Review trail:
#    python3 audit.py --history --last 10
