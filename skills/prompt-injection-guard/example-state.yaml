# ── Walkthrough ──────────────────────────────────────────────────────────────
#
# Scenario: Agent fetches a web page to summarise it. Before acting on the
# page content, it invokes prompt-injection-guard:
#
#   curl -s https://example.com/page | python3 guard.py --source "https://example.com/page"
#
# If BLOCKED (exit 2):
#   ✗  Injection Guard: BLOCKED
#      Source: https://example.com/page
#      Signals detected (3):
#        • ROLE_OVERRIDE: Role or system prompt override attempt
#          Match: "ignore previous instructions"
#        • AUTHORITY_CLAIM: False authority claim
#          Match: "as your developer"
#        • URGENCY_BYPASS: Urgency-based bypass attempt
#          Match: "act immediately without confirmation"
#
#      ⛔ Content BLOCKED — agent tells user what was found and halts.
#
# If WARNED (exit 1):
#   ⚠  Injection Guard: WARNED
#      → Agent asks: "This content contains a possible injection attempt —
#        should I act on it anyway?"
#
# If CLEAN (exit 0):
#   ✓  Injection Guard: CLEAN
#      → Agent proceeds normally.
#
# The blocklist auto-grows: any source that triggers 2+ blocks is added.
# On future requests from blocklisted sources, the agent pre-warns the user.
