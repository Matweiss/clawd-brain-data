<!-- Memory System Dashboard - Integrated into Mission Control -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory System Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --accent-primary: #00d4ff;
      --accent-secondary: #ff6b6b;
      --accent-success: #51cf66;
      --accent-warning: #ffd93d;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --border-color: #2a2a3a;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .last-updated {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    /* Tab Navigation */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1px;
    }
    
    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .tab:hover {
      color: var(--text-primary);
    }
    
    .tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-primary);
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 5px;
    }
    
    .stat-label {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    /* Projects Section */
    .projects-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .project-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .project-card:hover {
      border-color: var(--accent-primary);
      background: var(--bg-tertiary);
    }
    
    .project-card.stale {
      border-color: var(--accent-secondary);
      background: rgba(255, 107, 107, 0.05);
    }
    
    .project-info h3 {
      font-size: 18px;
      margin-bottom: 5px;
    }
    
    .project-meta {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-active { background: rgba(0, 212, 255, 0.2); color: var(--accent-primary); }
    .status-blocked { background: rgba(255, 107, 107, 0.2); color: var(--accent-secondary); }
    .status-completed { background: rgba(81, 207, 102, 0.2); color: var(--accent-success); }
    .status-planned { background: rgba(160, 160, 176, 0.2); color: var(--text-secondary); }
    
    .priority-high { color: var(--accent-secondary); }
    .priority-medium { color: var(--accent-warning); }
    .priority-low { color: var(--text-secondary); }
    
    /* Media Gallery */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    
    .media-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    
    .media-card:hover {
      transform: scale(1.02);
    }
    
    .media-preview {
      aspect-ratio: 16/9;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }
    
    .media-info {
      padding: 15px;
    }
    
    .media-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .media-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* Search */
    .search-box {
      width: 100%;
      padding: 15px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 16px;
      margin-bottom: 20px;
    }
    
    .search-box:focus {
      outline: none;
      border-color: var(--accent-primary);
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>🧠 Memory System</h1>
      <span class="last-updated">Last updated: <span id="last-updated">Loading...</span></span>
    </div>
    
    <div class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="projects">Projects</button>
      <button class="tab" data-tab="media">Media Archive</button>
      <button class="tab" data-tab="conversations">Conversations</button>
      <button class="tab" data-tab="search">Search</button>
    </div>
    
    <!-- Overview Tab -->
    <div class="tab-content active" id="overview">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-projects">-</div>
          <div class="stat-label">Active Projects</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-media">-</div>
          <div class="stat-label">Archived Media</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-stale">-</div>
          <div class="stat-label">Stale Projects</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-conversations">-</div>
          <div class="stat-label">Conversations</div>
        </div>
      </div>
      
      <h2 style="margin-bottom: 15px; font-size: 18px;">Recent Activity</h2>
      <div id="recent-activity" class="projects-list">
        <div class="loading">
          <div class="spinner"></div>
          Loading...
        </div>
      </div>
    </div>
    
    <!-- Projects Tab -->
    <div class="tab-content" id="projects">
      <div id="projects-list" class="projects-list">
        <div class="loading">
          <div class="spinner"></div>
          Loading projects...
        </div>
      </div>
    </div>
    
    <!-- Media Tab -->
    <div class="tab-content" id="media">
      <div id="media-grid" class="media-grid">
        <div class="loading">
          <div class="spinner"></div>
          Loading media...
        </div>
      </div>
    </div>
    
    <!-- Conversations Tab -->
    <div class="tab-content" id="conversations">
      <div id="conversations-list" class="projects-list">
        <div class="loading">
          <div class="spinner"></div>
          Loading conversations...
        </div>
      </div>
    </div>
    
    <!-- Search Tab -->
    <div class="tab-content" id="search">
      <input type="text" class="search-box" placeholder="Search projects, media, conversations..." id="search-input">
      <div id="search-results" class="projects-list">
        <p style="color: var(--text-secondary); text-align: center; padding: 40px;">
          Start typing to search your memory...
        </p>
      </div>
    </div>
  </div>
  
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
    
    // Load data from API (placeholder - would connect to real backend)
    async function loadData() {
      try {
        const response = await fetch('/api/memory/status');
        const data = await response.json();
        
        document.getElementById('stat-projects').textContent = data.activeProjects;
        document.getElementById('stat-media').textContent = data.mediaCount;
        document.getElementById('stat-stale').textContent = data.staleProjects;
        document.getElementById('stat-conversations').textContent = data.conversations;
        document.getElementById('last-updated').textContent = new Date().toLocaleString();
        
        renderProjects(data.projects);
        renderMedia(data.media);
        renderConversations(data.conversations);
        renderRecentActivity(data.recentActivity);
      } catch (e) {
        console.error('Failed to load data:', e);
        showError();
      }
    }
    
    function renderProjects(projects) {
      const container = document.getElementById('projects-list');
      if (!projects || projects.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">No projects found</p>';
        return;
      }
      
      container.innerHTML = projects.map(p => `
        <div class="project-card ${p.isStale ? 'stale' : ''}">
          <div class="project-info">
            <h3>${p.name}</h3>
            <div class="project-meta">
              <span class="priority-${p.priority}">● ${p.priority}</span>
              <span>Updated: ${p.lastUpdated}</span>
              ${p.isStale ? '<span style="color: var(--accent-secondary);">⚠️ Stale</span>' : ''}
            </div>
          </div>
          <span class="status-badge status-${p.status}">${p.status}</span>
        </div>
      `).join('');
    }
    
    function renderMedia(media) {
      const container = document.getElementById('media-grid');
      if (!media || media.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">No media archived</p>';
        return;
      }
      
      container.innerHTML = media.map(m => `
        <div class="media-card">
          <div class="media-preview">
            ${m.type === 'image' ? '🖼️' : '📄'}
          </div>
          <div class="media-info">
            <div class="media-title">${m.name}</div>
            <div class="media-meta">${m.project} • ${m.date}</div>
          </div>
        </div>
      `).join('');
    }
    
    function renderConversations(conversations) {
      const container = document.getElementById('conversations-list');
      if (!conversations || conversations.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">No conversations logged</p>';
        return;
      }
      
      // Similar to projects rendering
    }
    
    function renderRecentActivity(activity) {
      const container = document.getElementById('recent-activity');
      // Render recent updates
    }
    
    function showError() {
      document.querySelectorAll('.tab-content').forEach(c => {
        c.innerHTML = '<p style="color: var(--accent-secondary); text-align: center; padding: 40px;">Failed to load data. Please try again.</p>';
      });
    }
    
    // Search functionality
    document.getElementById('search-input')?.addEventListener('input', debounce(async (e) => {
      const query = e.target.value;
      if (!query) return;
      
      try {
        const response = await fetch(`/api/memory/search?q=${encodeURIComponent(query)}`);
        const results = await response.json();
        renderSearchResults(results);
      } catch (e) {
        console.error('Search failed:', e);
      }
    }, 300));
    
    function debounce(fn, ms) {
      let timeout;
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => fn(...args), ms);
      };
    }
    
    // Initial load
    loadData();
  </script>
</body>
</html>
